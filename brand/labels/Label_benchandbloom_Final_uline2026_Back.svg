  <line x1="22" y1="98.5" x2="176" y2="98.5" stroke="#2D2933" stroke-width="1.2"/>
  <text x="22" y="104" font-family="Inter, Arial, sans-serif" font-size="4.1" fill="#2D2933">*5% or less is a little, 15% or more is a lot</text>
  <text x="22" y="109" font-family="Inter, Arial, sans-serif" font-size="4.1" fill="#2D2933">*5% ou moins c'est peu, 15% ou plus c'est beaucoup</text>

  <!-- Ingredients (4, bilingual; wrapped) -->
  <text x="18" y="119" font-family="Inter, Arial, sans-serif" font-size="5" fill="#2D2933"><tspan font-weight="600">Ingredients:</tspan> Sugar, water, lavender, butterfly pea flower</text>
  <text x="18" y="125" font-family="Inter, Arial, sans-serif" font-size="5" fill="#2D2933">(Clitoria ternatea).</text>
  <text x="18" y="132" font-family="Inter, Arial, sans-serif" font-size="5" fill="#2D2933"><tspan font-weight="600">Ingrédients :</tspan> Sucre, eau, lavande, fleur de pois bleu</text>
  <text x="18" y="138" font-family="Inter, Arial, sans-serif" font-size="5" fill="#2D2933">(Clitoria ternatea).</text>

  <text x="18" y="147" font-family="Inter, Arial, sans-serif" font-size="5" fill="#2D2933">Stir into gin, vodka or sparkling cocktails, or soda.</text>
  <text x="18" y="153" font-family="Inter, Arial, sans-serif" font-size="5" fill="#5A4A78">Add citrus to turn it from blue to pink.</text>
  <text x="18" y="159" font-family="Inter, Arial, sans-serif" font-size="5" fill="#2D2933">Refrigerate after opening / Réfrigérer après ouverture.</text>
  <text x="18" y="166" font-family="Inter, Arial, sans-serif" font-size="5" fill="#2D2933">Best before / Meilleur avant: YYYY MM DD &#160; LOT 2026-001</text>

  <text x="18" y="170" font-family="Inter, Arial, sans-serif" font-weight="600" font-size="4.9" fill="#2D2933">Prepared for / Préparé pour:</text>
  <text x="18" y="176" font-family="Inter, Arial, sans-serif" font-size="4.7" fill="#2D2933">Bench &amp; Bloom, 3820 Partridge Rd,</text>
  <text x="18" y="181" font-family="Inter, Arial, sans-serif" font-size="4.7" fill="#2D2933">Naramata, BC, Canada V0H 1N0</text>
  <text x="18" y="187" font-family="Inter, Arial, sans-serif" font-size="4.7" fill="#5A4A78">benchandbloom.com</text>
  <text x="18" y="192" font-family="Inter, Arial, sans-serif" font-size="4.7" fill="#5A4A78">hello@benchandbloom.com</text>
  <text x="18" y="199" font-family="Inter, Arial, sans-serif" font-size="4.4" fill="#5A5266">Product of Canada / Produit du Canada</text>

